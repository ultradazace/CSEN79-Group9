<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eBay-Lite</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="logo">eBay<span>-Lite</span></div>
    <div class="nav-links">
      <button class="active" onclick="showView('listings', this)">Marketplace</button>
      <button onclick="showView('watchlist', this)">Watchlist</button>
      <button onclick="showView('history', this)">Bid History</button>
    </div>
    <div class="nav-user">
      <span>User:</span>
      <select id="currentUser" onchange="onUserChange()">
        <option value="0">user_0</option>
        <option value="1">user_1</option>
        <option value="2">user_2</option>
        <option value="3">user_3</option>
        <option value="4">user_4</option>
        <option value="5">user_5</option>
        <option value="6">user_6</option>
        <option value="7">user_7</option>
        <option value="8">user_8</option>
        <option value="9">user_9</option>
      </select>
    </div>
  </nav>

  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="stat-box">
        <div class="stat-num" id="stat-active">0</div>
        <div class="stat-label">Active Auctions</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-bids">0</div>
        <div class="stat-label">Total Bids</div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- MARKETPLACE VIEW -->
      <div id="view-listings">
        <div class="toolbar">
          <input type="text" id="searchInput" placeholder="Search listings…" oninput="renderListings()">
          <select id="sortSelect" onchange="renderListings()">
            <option value="expiry">Ending Soon</option>
            <option value="bid-high">Highest Bid</option>
            <option value="bid-low">Lowest Bid</option>
          </select>
          <button class="btn-primary" onclick="openNewListing()">+ List Item</button>
        </div>

        <!-- Cards injected here by app.js. Shows empty state when no listings exist. -->
        <div class="listings" id="listingsGrid">
          <div class="empty" style="grid-column:1/-1">
            <div class="empty-icon">🏪</div>
            <p>No listings yet.</p>
            <p>Be the first to list an item!</p>
          </div>
        </div>
      </div>

      <!-- WATCHLIST VIEW -->
      <div id="view-watchlist" style="display:none">
        <div class="panel">
          <h2>Watchlist</h2>
          <div id="watchlistContent">
            <div class="empty">
              <div class="empty-icon">☆</div>
              <p>Nothing in your watchlist yet.</p>
              <p>Click ☆ on any listing to track it.</p>
            </div>
          </div>
        </div>
      </div>

      <!-- HISTORY VIEW -->
      <div id="view-history" style="display:none">
        <div class="panel">
          <h2>Bid History</h2>
          <div id="historyContent">
            <div class="empty">
              <div class="empty-icon">📋</div>
              <p>No bid history yet.</p>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- BID MODAL -->
  <div class="modal-overlay" id="bidModal">
    <div class="modal">
      <div class="modal-title" id="bm-title"></div>
      <div class="modal-meta" id="bm-meta"></div>
      <div class="modal-stats">
        <div class="modal-stat">
          <div class="label">CURRENT BID</div>
          <div class="value" id="bm-curbid"></div>
        </div>
        <div class="modal-stat">
          <div class="label">BUY IT NOW</div>
          <div class="value" id="bm-bin"></div>
        </div>
        <div class="modal-stat">
          <div class="label">TIME LEFT</div>
          <div class="value green" id="bm-time"></div>
        </div>
      </div>
      <div class="form-row">
        <label>Your Bid (min <span id="bm-min"></span>)</label>
        <div class="input-row">
          <input type="number" id="bidAmount" placeholder="0.00">
          <button class="btn-primary" onclick="submitBid()">Place Bid</button>
        </div>
        <div class="msg" id="bidMsg"></div>
      </div>
      <div class="bid-history-section">
        <div class="section-label">RECENT BIDS</div>
        <div id="bidHistoryList"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeBidModal()">Close</button>
      </div>
    </div>
  </div>

  <!-- NEW LISTING MODAL -->
  <div class="modal-overlay" id="newListingModal">
    <div class="modal">
      <div class="modal-title">List a New Item</div>
      <div class="form-row">
        <label>Title</label>
        <input type="text" id="nl-title" placeholder="Item name">
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label>Starting Price ($)</label>
          <input type="number" id="nl-start" placeholder="1.00" min="0.01">
        </div>
        <div class="form-row">
          <label>Buy It Now ($) <span class="optional">optional</span></label>
          <input type="number" id="nl-bin" placeholder="—">
        </div>
        <div class="form-row">
          <label>Duration (hours)</label>
          <select id="nl-dur">
            <option value="0.0167">1 minute</option>
            <option value="0.0833">5 minutes</option>
            <option value="0.5" selected>30 minutes</option>
            <option value="1">1 hour</option>
            <option value="6">6 hours</option>
          </select>
        </div>
      </div>
      <div class="msg" id="nlMsg"></div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeNewListing()">Cancel</button>
        <button class="btn-primary" onclick="submitListing()">List Item</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
